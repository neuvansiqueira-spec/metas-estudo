name: Corrigir cabeçalho inicial

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/fix-initial-header-cache.yml"

permissions:
  contents: write

jobs:
  fix-header:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Corrigir cabeçalho e service worker
        run: |
          python - <<'PY'
          from pathlib import Path

          root_index = Path("index.html")
          html = root_index.read_text(encoding="utf-8")
          html = html.replace("<strong>Metas Concurso</strong>", "<strong>Aldus Metas Concurso</strong>")
          html = html.replace("<small>Planeje, registre e revise</small>", "<small>Planeje, Registre e Revise</small>")
          root_index.write_text(html, encoding="utf-8")

          Path("docs/index.html").write_text(html, encoding="utf-8")

          pie = Path("question-history-pie.js")
          if pie.exists():
              Path("docs/question-history-pie.js").write_text(pie.read_text(encoding="utf-8"), encoding="utf-8")

          for filename in ("service-worker.js", "docs/service-worker.js"):
              path = Path(filename)
              source = path.read_text(encoding="utf-8")
              source = source.replace(
                  '  "20260717-material-cronometro-v40"\n];',
                  '  "20260717-material-cronometro-v40",\n  "20260717-logo-aldus-meta-v41"\n];'
              )
              source = source.replace(
                  'const CURRENT_VERSION = "20260717-logo-aldus-meta-v41";',
                  'const CURRENT_VERSION = "20260717-cabecalho-estavel-v42";'
              )
              source = source.replace(
                  'const ASSET_CACHE_NAME = `${CACHE_NAME}-startup-v15`;',
                  'const ASSET_CACHE_NAME = `${CACHE_NAME}-startup-v16`;'
              )
              source = source.replace(
                  '  "script.js",\n  "question-accuracy-spectrum.js",',
                  '  "script.js",\n  "question-history-pie.js",\n  "question-accuracy-spectrum.js",'
              )
              source = source.replace(
                  '  "timer-material-link-fix.js",\n  "aldus-meta-branding.js",\n  "sync-integral-core.js",',
                  '  "timer-material-link-fix.js",\n  "sync-integral-core.js",'
              )
              source = source.replace(
                  '  "manifest.json",\n  "icons/aldus-meta-logo.svg",\n  "icons/logo-mark.svg",',
                  '  "manifest.json",\n  "icons/logo-mark.svg",'
              )
              source = source.replace(
                  '\n<script src="aldus-meta-branding.js?v=${CURRENT_VERSION}" data-aldus-meta-branding="v41"></script>',
                  ''
              )
              path.write_text(source, encoding="utf-8")
          PY

      - name: Confirmar correção
        run: |
          grep -q 'Aldus Metas Concurso' index.html
          grep -q 'Planeje, Registre e Revise' index.html
          grep -q 'Aldus Metas Concurso' docs/index.html
          grep -q '20260717-cabecalho-estavel-v42' service-worker.js
          grep -q 'startup-v16' service-worker.js
          ! grep -q 'data-aldus-meta-branding="v41"' service-worker.js
          cmp index.html docs/index.html

      - name: Publicar correção
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html docs/index.html service-worker.js docs/service-worker.js question-history-pie.js docs/question-history-pie.js
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Fixar cabeçalho textual desde a primeira abertura"
          git push
