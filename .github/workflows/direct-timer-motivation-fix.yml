name: Correção direta do cronômetro livre

on:
  push:
    paths:
      - '.trigger-direct-timer-fix'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Aplicar correção direta
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const version = '20260717-mensagens-cronometro-livre-direto-v30';

          function replaceRequired(source, oldText, newText, label) {
            if (!source.includes(oldText)) throw new Error(`Trecho não encontrado: ${label}`);
            return source.replace(oldText, newText);
          }

          function patchScript(file) {
            let source = fs.readFileSync(file, 'utf8');
            source = source.replace(/const APP_VERSION = "[^"]+";/, `const APP_VERSION = "${version}";`);
            source = replaceRequired(
              source,
              'const TIMER_MOTIVATIONAL_TOAST_DURATION_MS = 5000;',
              'const TIMER_MOTIVATIONAL_TOAST_DURATION_MS = 30000;',
              'duração da mensagem'
            );
            source = replaceRequired(
              source,
              'function timerPlannedSeconds(goal = floatingTimerGoal()) { return floatingTimer.mode === "free" ? Math.max(0, Math.round((Number(floatingTimer.sessionGoalMinutes) || 0) * 60)) : Math.max(0, Math.round((Number(goal?.minutes) || 0) * 60)); }',
              'function timerPlannedSeconds(goal = floatingTimerGoal()) { return floatingTimer.mode === "free" ? Math.max(0, Math.round((Number(floatingTimer.sessionGoalMinutes) || Number(goal?.minutes) || 0) * 60)) : Math.max(0, Math.round((Number(goal?.minutes) || 0) * 60)); }',
              'tempo planejado no modo livre'
            );
            source = replaceRequired(
              source,
              'if (!goal || !supportedMode || !planned || state.settings?.timerPreferences?.motivationalMessages === false) return;',
              'if ((floatingTimer.mode !== "free" && !goal) || !supportedMode || !planned || state.settings?.timerPreferences?.motivationalMessages === false) return;',
              'guarda das mensagens motivacionais'
            );
            source = replaceRequired(
              source,
              'const sessionGoalMinutes = selectedMode === "free" ? 0 : 0;',
              'const sessionGoalMinutes = selectedMode === "free" ? Math.max(0, Number(goal.minutes) || 0) : 0;',
              'duração inicial do modo livre'
            );
            const oldToast = `function showTimerMotivationalToast(milestone, phrase = chooseTimerMotivationalMessage(milestone)) {
  if (!elements.timerMotivationalToast || !phrase) return;
  clearTimeout(timerMotivationalToastTimeout);
  elements.timerMotivationalToast.innerHTML = \`<strong>\${milestone}% CONCLUÍDO</strong><span>\${phrase}</span>\`;
  elements.timerMotivationalToast.hidden = false;
  elements.timerMotivationalToast.classList.add("visible");
  timerMotivationalToastTimeout = setTimeout(() => {
    elements.timerMotivationalToast.classList.remove("visible");
    timerMotivationalToastTimeout = setTimeout(() => { elements.timerMotivationalToast.hidden = true; }, 260);
  }, TIMER_MOTIVATIONAL_TOAST_DURATION_MS);
}`;
            const newToast = `function showTimerMotivationalToast(milestone, phrase = chooseTimerMotivationalMessage(milestone)) {
  const toast = elements.timerMotivationalToast || document.getElementById("timerMotivationalToast");
  if (!toast || !phrase) return;
  clearTimeout(timerMotivationalToastTimeout);
  toast.innerHTML = \`<strong>\${milestone}% CONCLUÍDO</strong><span>\${phrase}</span>\`;
  toast.hidden = false;
  toast.classList.add("visible");
  Object.assign(toast.style, { display: "grid", position: "fixed", top: "18px", left: "50%", transform: "translateX(-50%)", zIndex: "100000", opacity: "1", visibility: "visible", pointerEvents: "none", maxWidth: "min(92vw, 620px)" });
  timerMotivationalToastTimeout = setTimeout(() => {
    toast.classList.remove("visible");
    toast.style.opacity = "0";
    timerMotivationalToastTimeout = setTimeout(() => { toast.hidden = true; toast.style.display = "none"; }, 260);
  }, TIMER_MOTIVATIONAL_TOAST_DURATION_MS);
}`;
            source = replaceRequired(source, oldToast, newToast, 'exibição visível da mensagem');
            fs.writeFileSync(file, source);
          }

          patchScript('script.js');
          patchScript('docs/script.js');

          for (const file of ['index.html', 'docs/index.html']) {
            let source = fs.readFileSync(file, 'utf8');
            source = source.replace(/20260717-numero-qc-v26/g, version);
            fs.writeFileSync(file, source);
          }

          for (const file of ['service-worker.js', 'docs/service-worker.js']) {
            let source = fs.readFileSync(file, 'utf8');
            source = source.replace(/const CURRENT_VERSION = "[^"]+";/, `const CURRENT_VERSION = "${version}";`);
            source = source.replace(/const ASSET_CACHE_NAME = `\$\{CACHE_NAME\}-startup-v\d+`;/, 'const ASSET_CACHE_NAME = `${CACHE_NAME}-startup-v6`;');
            fs.writeFileSync(file, source);
          }

          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.version = version;
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');

          let stable = fs.readFileSync('VERSAO_ESTAVEL.md', 'utf8');
          stable = stable.replace(/`20260717-[^`]+`/, `\`${version}\``);
          stable += `\n\n## Correção direta das mensagens motivacionais\n\nO Cronômetro Livre utiliza diretamente a duração da meta, verifica os marcos de progresso e força a mensagem a permanecer visível por 30 segundos também no aplicativo instalado para Windows. A correção não depende da transformação do script pelo cache.\n`;
          fs.writeFileSync('VERSAO_ESTAVEL.md', stable);

          for (const file of fs.readdirSync('tests').filter(name => name.endsWith('.test.js'))) {
            const full = path.join('tests', file);
            let source = fs.readFileSync(full, 'utf8');
            source = source
              .replace(/20260717-sincronizacao-integral-cronometro-v29/g, version)
              .replace(/20260717-cronometro-livre-meta-v28/g, version)
              .replace(/20260717-numero-qc-v26/g, version);
            fs.writeFileSync(full, source);
          }

          const directTest = `const test = require('node:test');
const assert = require('node:assert/strict');
const fs = require('node:fs');
const script = fs.readFileSync('script.js', 'utf8');
const html = fs.readFileSync('index.html', 'utf8');
test('cronômetro livre possui mensagens diretas no aplicativo instalado', () => {
  assert.match(script, /TIMER_MOTIVATIONAL_TOAST_DURATION_MS = 30000/);
  assert.match(script, /floatingTimer\.mode !== "free" && !goal/);
  assert.match(script, /Number\(floatingTimer\.sessionGoalMinutes\) \|\| Number\(goal\?\.minutes\) \|\| 0/);
  assert.match(script, /sessionGoalMinutes = selectedMode === "free" \? Math\.max\(0, Number\(goal\.minutes\) \|\| 0\) : 0/);
  assert.match(script, /zIndex: "100000"/);
  assert.match(script, /document\.getElementById\("timerMotivationalToast"\)/);
  assert.match(html, /script\.js\?v=20260717-mensagens-cronometro-livre-direto-v30/);
});
test('raiz e docs permanecem iguais', () => {
  assert.equal(fs.readFileSync('script.js', 'utf8'), fs.readFileSync('docs/script.js', 'utf8'));
  assert.equal(fs.readFileSync('index.html', 'utf8'), fs.readFileSync('docs/index.html', 'utf8'));
});
`;
          fs.writeFileSync('tests/timer-motivation-direct.test.js', directTest);
          NODE
      - name: Validar sintaxe e testes críticos
        run: |
          node --check script.js
          node --check service-worker.js
          node --test tests/timer-motivation-direct.test.js tests/free-timer-motivation.test.js tests/sync-integral-timer.test.js
      - name: Publicar correção
        run: |
          rm -f .trigger-direct-timer-fix
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js docs/script.js index.html docs/index.html service-worker.js docs/service-worker.js package.json VERSAO_ESTAVEL.md tests .trigger-direct-timer-fix
          git commit -m "Corrige diretamente mensagens do Cronômetro Livre no app"
          git push
