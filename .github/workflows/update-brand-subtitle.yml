name: Atualizar subtítulo da marca

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/update-brand-subtitle.yml"

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Atualizar texto
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = "<small>Planeje, registre e revise</small>"
          new = "<small>Planeje, Registre e Revise</small>"
          if old not in text:
              raise SystemExit("Texto anterior não encontrado em index.html")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Salvar alteração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Ajustar maiúsculas do subtítulo da marca"
          git push
