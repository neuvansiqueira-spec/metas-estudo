name: Aplicar capitalização dos tópicos do Resumo/Aula v134

on:
  push:
    branches:
      - agent/resumo-aula-titulos-maiusculos-v134
    paths:
      - ".github/workflows/apply-resumo-aula-titlecase-v134.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/resumo-aula-titulos-maiusculos-v134
          fetch-depth: 0

      - name: Aplicar alteração isolada e atualizar cache
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          OLD_VERSION = "20260723-versao-unica-v133"
          NEW_VERSION = "20260723-resumo-aula-topicos-v134"

          def replace_exact(path, old, new, expected=1):
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(old)
              if count != expected:
                  raise SystemExit(f"Âncora inesperada em {path}: esperada {expected}, encontrada {count}")
              file.write_text(text.replace(old, new), encoding="utf-8")

          topic_rule = (
              "## CAPITALIZAÇÃO DOS TÓPICOS E SUBTÓPICOS\\n\\n"
              "MANTENHA OS TÍTULOS PRINCIPAIS MARCADOS COM ♦️ INTEGRALMENTE EM LETRAS MAIÚSCULAS.\\n\\n"
              "NOS CABEÇALHOS DE TÓPICO OU SUBTÓPICO MARCADOS COM ▶️📚, INICIE COM LETRA MAIÚSCULA TODAS AS PALAVRAS RELEVANTES.\\n\\n"
              "MANTENHA EM MINÚSCULAS, QUANDO NÃO FOREM A PRIMEIRA PALAVRA DO CABEÇALHO, AS PALAVRAS DE LIGAÇÃO: a, as, o, os, de, da, das, do, dos, em, no, na, nos, nas, ao, aos, à, às, por, para, com, sem, sob, sobre, entre, e, ou, mas e nem.\\n\\n"
              "PRESERVE SIGLAS, ABREVIAÇÕES E NOMES PRÓPRIOS COM A GRAFIA CORRETA.\\n\\n"
              "APLIQUE ESTA REGRA SOMENTE AO CABEÇALHO ▶️📚. NÃO APLIQUE AOS TÍTULOS ♦️, ÀS FRASES EXPLICATIVAS, AOS ITENS NUMERADOS NEM AOS RÓTULOS INTERNOS COMO CONDUTA:, FOCO:, REGRA:, EXCEÇÃO: OU LIMITAÇÃO:.\\n\\n"
              "EXEMPLO OBRIGATÓRIO DE PADRÃO:\\n\\n"
              "▶️📚 Critério Material ou Substancial. Conteúdo Ofensivo:\\n\\n"
          )

          anchor = "## CONTROLE OBJETIVO DE TÍTULOS, SUBTÓPICOS E LINHAS\\n\\nUSE ♦️ SOMENTE PARA GRANDES EIXOS TEMÁTICOS AUTÔNOMOS."
          replacement = topic_rule + anchor

          for path in ["app-v118.js", "docs/app-v118.js"]:
              replace_exact(path, anchor, replacement)

          version_files = [
              "index.html", "docs/index.html",
              "script.js", "docs/script.js",
              "app-v118.js", "docs/app-v118.js",
              "factory-lei-prompt-v123.js", "docs/factory-lei-prompt-v123.js",
              "service-worker-v118.js", "docs/service-worker-v118.js",
              "service-worker-v123.js", "docs/service-worker-v123.js",
              "service-worker.js", "docs/service-worker.js",
              "package.json", "tests/version-display-v133.test.js"
          ]
          for path in version_files:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              count = text.count(OLD_VERSION)
              if count < 1:
                  raise SystemExit(f"Versão anterior não encontrada em {path}")
              file.write_text(text.replace(OLD_VERSION, NEW_VERSION), encoding="utf-8")

          test_source = '''const test = require("node:test");
          const assert = require("node:assert/strict");
          const fs = require("node:fs");
          const read = (file) => fs.readFileSync(file, "utf8");

          const marker = "## CAPITALIZAÇÃO DOS TÓPICOS E SUBTÓPICOS";
          const example = "▶️📚 Critério Material ou Substancial. Conteúdo Ofensivo:";

          test("regra foi adicionada somente ao prompt Resumo/Aula", () => {
            for (const file of ["app-v118.js", "docs/app-v118.js"]) {
              const source = read(file);
              assert.equal((source.match(new RegExp(marker, "g")) || []).length, 1, file);
              assert.match(source, new RegExp(example.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\$&")), file);
              assert.match(source, /MANTENHA OS TÍTULOS PRINCIPAIS MARCADOS COM ♦️ INTEGRALMENTE EM LETRAS MAIÚSCULAS/, file);
              assert.match(source, /APLIQUE ESTA REGRA SOMENTE AO CABEÇALHO ▶️📚/, file);
              assert.match(source, /NÃO APLIQUE AOS TÍTULOS ♦️/, file);
              const resumoStart = source.indexOf("const FACTORY_RESUMO_AULA_PROMPT_SEGMENT");
              const resumoEnd = source.indexOf("const FACTORY_RESUMO_AULA_PROMPT =", resumoStart);
              const markerIndex = source.indexOf(marker);
              assert.ok(resumoStart >= 0 && resumoEnd > resumoStart && markerIndex > resumoStart && markerIndex < resumoEnd, file);
            }
          });

          test("raiz e docs permanecem idênticos", () => {
            for (const file of [
              "index.html", "script.js", "app-v118.js", "factory-lei-prompt-v123.js",
              "service-worker-v118.js", "service-worker-v123.js", "service-worker.js"
            ]) assert.equal(read(file), read("docs/" + file), file);
          });

          test("versão e cache foram atualizados de forma coerente", () => {
            const version = "20260723-resumo-aula-topicos-v134";
            for (const file of ["index.html", "docs/index.html", "script.js", "docs/script.js", "app-v118.js", "docs/app-v118.js", "service-worker.js", "docs/service-worker.js"]) {
              assert.match(read(file), new RegExp(version), file);
            }
          });
          '''
          Path("tests/resumo-aula-titlecase-v134.test.js").write_text(test_source, encoding="utf-8")
          Path(".github/workflows/apply-resumo-aula-titlecase-v134.yml").unlink()
          PY

      - name: Validar sintaxe, escopo e paridade
        shell: bash
        run: |
          node --check app-v118.js
          node --check docs/app-v118.js
          node --check factory-lei-prompt-v123.js
          node --check docs/factory-lei-prompt-v123.js
          node --check service-worker-v118.js
          node --check service-worker-v123.js
          node --check service-worker.js
          node --test tests/resumo-aula-titlecase-v134.test.js tests/version-display-v133.test.js tests/timer-safety-v132.test.js
          cmp index.html docs/index.html
          cmp script.js docs/script.js
          cmp app-v118.js docs/app-v118.js
          cmp factory-lei-prompt-v123.js docs/factory-lei-prompt-v123.js
          cmp service-worker-v118.js docs/service-worker-v118.js
          cmp service-worker-v123.js docs/service-worker-v123.js
          cmp service-worker.js docs/service-worker.js
          git diff --check

      - name: Confirmar escopo e publicar somente na branch
        shell: bash
        run: |
          python3 - <<'PY'
          import subprocess
          allowed = {
              ".github/workflows/apply-resumo-aula-titlecase-v134.yml",
              "index.html", "docs/index.html",
              "script.js", "docs/script.js",
              "app-v118.js", "docs/app-v118.js",
              "factory-lei-prompt-v123.js", "docs/factory-lei-prompt-v123.js",
              "service-worker-v118.js", "docs/service-worker-v118.js",
              "service-worker-v123.js", "docs/service-worker-v123.js",
              "service-worker.js", "docs/service-worker.js",
              "package.json", "tests/version-display-v133.test.js",
              "tests/resumo-aula-titlecase-v134.test.js"
          }
          paths = {line[3:] for line in subprocess.check_output(["git", "status", "--short"], text=True).splitlines()}
          unexpected = paths - allowed
          if unexpected:
              raise SystemExit(f"Arquivos inesperados: {sorted(unexpected)}")
          required = allowed - {".github/workflows/apply-resumo-aula-titlecase-v134.yml"}
          missing = required - paths
          if missing:
              raise SystemExit(f"Arquivos esperados sem alteração: {sorted(missing)}")
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Ajusta capitalização dos tópicos do Resumo/Aula v134"
          git push origin HEAD:agent/resumo-aula-titulos-maiusculos-v134
