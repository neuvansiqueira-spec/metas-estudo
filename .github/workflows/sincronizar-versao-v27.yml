name: Sincronizar versão v27

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  sincronizar:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar código e identificação da versão
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          old_version = "20260717-numero-qc-v26"
          new_version = "20260717-cronometro-livre-motivacao-v27"
          old_guard = 'if (!goal || !supportedMode || !planned || state.settings?.timerPreferences?.motivationalMessages === false) return;'
          new_guard = 'if ((floatingTimer.mode !== "free" && !goal) || !supportedMode || !planned || state.settings?.timerPreferences?.motivationalMessages === false) return;'

          version_files = [
              "script.js",
              "docs/script.js",
              "index.html",
              "docs/index.html",
              "package.json",
              "VERSAO_ESTAVEL.md",
          ]

          for filename in version_files:
              path = Path(filename)
              if not path.exists():
                  continue
              text = path.read_text(encoding="utf-8")
              text = text.replace(old_version, new_version)
              if filename.endswith("script.js"):
                  if old_guard not in text and new_guard not in text:
                      raise SystemExit(f"Guarda motivacional não encontrada em {filename}")
                  text = text.replace(old_guard, new_guard)
                  text = text.replace(
                      "const TIMER_MOTIVATIONAL_TOAST_DURATION_MS = 5000;",
                      "const TIMER_MOTIVATIONAL_TOAST_DURATION_MS = 30000;",
                  )
              path.write_text(text, encoding="utf-8")

          service_worker = '''// versão anterior: metas-estudo-20260717-numero-qc-v26
          const CACHE_NAME = "metas-estudo-20260717-cronometro-livre-motivacao-v27";
          const ASSET_CACHE_NAME = `${CACHE_NAME}-startup-v1`;
          const FILES_TO_CACHE = [
            "./",
            "index.html",
            "style.css",
            "script.js",
            "analytics-engine.js",
            "study-advisor.js",
            "advisor-navigation-engine.js",
            "storage-indexeddb.js",
            "manifest.json",
            "icons/logo-mark.svg",
            "icons/icon.svg",
            "icons/icon-maskable.svg"
          ];

          self.addEventListener("install", (event) => {
            event.waitUntil(
              caches.open(ASSET_CACHE_NAME).then((cache) => cache.addAll(FILES_TO_CACHE))
            );
            self.skipWaiting();
          });

          self.addEventListener("activate", (event) => {
            event.waitUntil(
              caches.keys().then((cacheNames) => Promise.all(
                cacheNames
                  .filter((cacheName) => cacheName !== ASSET_CACHE_NAME)
                  .map((cacheName) => caches.delete(cacheName))
              ))
            );
            self.clients.claim();
          });

          function shouldPreferNetwork(request) {
            const destination = request.destination;
            return request.mode === "navigate" || ["document", "script", "style", "worker"].includes(destination);
          }

          function cacheResponse(request, response) {
            if (!response || !response.ok) return;
            caches.open(ASSET_CACHE_NAME).then((cache) => cache.put(request, response));
          }

          function networkFirstNavigation(request) {
            return fetch(request)
              .then((response) => {
                cacheResponse(request, response.clone());
                return response;
              })
              .catch(() => caches.match(request).then((cachedResponse) => cachedResponse || caches.match("index.html")));
          }

          function staleWhileRevalidate(request) {
            return caches.match(request).then((cachedResponse) => {
              const networkResponse = fetch(request)
                .then((response) => {
                  cacheResponse(request, response.clone());
                  return response;
                })
                .catch(() => cachedResponse);
              return cachedResponse || networkResponse;
            });
          }

          self.addEventListener("fetch", (event) => {
            if (event.request.method !== "GET") return;

            // HTML remains network-first so deployments are visible immediately. App assets use
            // stale-while-revalidate: a warm cache opens instantly and is refreshed in background.
            if (shouldPreferNetwork(event.request) && (event.request.mode === "navigate" || event.request.destination === "document")) {
              event.respondWith(networkFirstNavigation(event.request));
              return;
            }

            if (["script", "style", "worker", "image", "manifest"].includes(event.request.destination)) {
              event.respondWith(staleWhileRevalidate(event.request));
            }
          });
          '''
          service_worker = "\n".join(line[10:] if line.startswith("          ") else line for line in service_worker.splitlines()) + "\n"
          Path("service-worker.js").write_text(service_worker, encoding="utf-8")
          Path("docs/service-worker.js").write_text(service_worker, encoding="utf-8")

          test = r'''const test = require("node:test");
          const assert = require("node:assert/strict");
          const fs = require("node:fs");

          const expectedVersion = "20260717-cronometro-livre-motivacao-v27";

          for (const file of ["script.js", "docs/script.js"]) {
            test(`${file}: versão e mensagens do Cronômetro Livre estão sincronizadas`, () => {
              const source = fs.readFileSync(file, "utf8");
              const start = source.indexOf("function checkTimerMotivationalProgress");
              const end = source.indexOf("let timerAudioContext", start);
              assert.notEqual(start, -1);
              assert.notEqual(end, -1);
              const block = source.slice(start, end);

              assert.match(source, new RegExp(`APP_VERSION = "${expectedVersion}"`));
              assert.match(source, /TIMER_MOTIVATIONAL_TOAST_DURATION_MS = 30000/);
              assert.match(block, /floatingTimer\.mode !== "free" && !goal/);
              assert.doesNotMatch(block, /if \(!goal \|\| !supportedMode/);
            });
          }

          for (const file of ["index.html", "docs/index.html", "package.json", "service-worker.js", "docs/service-worker.js"]) {
            test(`${file}: não contém a versão antiga`, () => {
              const source = fs.readFileSync(file, "utf8");
              assert.match(source, new RegExp(expectedVersion));
              assert.doesNotMatch(source, /20260717-numero-qc-v26/);
            });
          }

          test("arquivos publicados permanecem sincronizados", () => {
            assert.equal(fs.readFileSync("script.js", "utf8"), fs.readFileSync("docs/script.js", "utf8"));
            assert.equal(fs.readFileSync("index.html", "utf8"), fs.readFileSync("docs/index.html", "utf8"));
            assert.equal(fs.readFileSync("service-worker.js", "utf8"), fs.readFileSync("docs/service-worker.js", "utf8"));
          });
          '''
          test = "\n".join(line[10:] if line.startswith("          ") else line for line in test.splitlines()) + "\n"
          Path("tests/free-timer-motivation.test.js").write_text(test, encoding="utf-8")
          PY

      - name: Validar correção
        run: |
          node --check script.js
          node --check docs/script.js
          node --check service-worker.js
          node --check docs/service-worker.js
          npm test
          cmp -s script.js docs/script.js
          cmp -s index.html docs/index.html
          cmp -s service-worker.js docs/service-worker.js
          git diff --check

      - name: Publicar e remover fluxo temporário
        shell: bash
        run: |
          rm .github/workflows/sincronizar-versao-v27.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add script.js docs/script.js index.html docs/index.html package.json VERSAO_ESTAVEL.md service-worker.js docs/service-worker.js tests/free-timer-motivation.test.js .github/workflows/sincronizar-versao-v27.yml
          git commit -m "Sincroniza versão v27 em todo o site"
          git push origin HEAD
