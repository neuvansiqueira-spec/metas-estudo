name: Publicar gráfico por período v43

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/publish-question-history-v43.yml"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sincronizar arquivos e renovar cache
        shell: bash
        run: |
          set -euo pipefail
          cp question-history-pie.js docs/question-history-pie.js
          python - <<'PY'
          from pathlib import Path

          root = Path('service-worker.js')
          text = root.read_text(encoding='utf-8')
          previous = '  "20260717-logo-aldus-meta-v41"\n];'
          replacement = '  "20260717-logo-aldus-meta-v41",\n  "20260717-cabecalho-estavel-v42"\n];'
          if '20260717-cabecalho-estavel-v42"\n];' not in text:
              text = text.replace(previous, replacement)
          text = text.replace('const CURRENT_VERSION = "20260717-cabecalho-estavel-v42";', 'const CURRENT_VERSION = "20260717-grafico-periodo-recolhivel-v43";')
          text = text.replace('startup-v16', 'startup-v17')
          root.write_text(text, encoding='utf-8')
          Path('docs/service-worker.js').write_text(text, encoding='utf-8')
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add question-history-pie.js docs/question-history-pie.js service-worker.js docs/service-worker.js
          git commit -m "Publica gráfico por período recolhível v43"
          git push