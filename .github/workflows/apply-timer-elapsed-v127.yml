name: Aplicar cronômetro crescente v127

on:
  push:
    paths:
      - ".github/workflows/apply-timer-elapsed-v127.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar contador crescente isolado
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          version = "20260721-cronometro-crescente-v127"
          filename = "timer-elapsed-v127.js"
          script_tag = f'  <script src="{filename}?v={version}"></script>'

          js = r'''(() => {
            "use strict";

            const PATCH_VERSION = "20260721-cronometro-crescente-v127";
            const timer = document.getElementById("floatingTimer");
            const progressText = document.getElementById("timerProgressText");
            const timerTime = document.getElementById("timerTime");
            const timerMode = document.getElementById("timerMode");
            if (!timer || !progressText || !timerTime || !timerMode) return;

            function ensureStyles() {
              if (document.getElementById("timerElapsedStylesV127")) return;
              const style = document.createElement("style");
              style.id = "timerElapsedStylesV127";
              style.textContent = `
                html[data-aldus-theme="premium-stable"] body #floatingTimer .timer-elapsed-time {
                  display: flex;
                  align-items: center;
                  justify-content: space-between;
                  gap: 10px;
                  margin-top: 5px;
                  padding: 7px 10px;
                  border: 1px solid rgba(95, 168, 216, .45);
                  border-radius: 11px;
                  background: rgba(5, 28, 48, .72);
                  color: #c9deed;
                  font-size: .82rem;
                  line-height: 1.2;
                }
                html[data-aldus-theme="premium-stable"] body #floatingTimer .timer-elapsed-time strong {
                  color: #ffffff;
                  font-size: .94rem;
                  font-variant-numeric: tabular-nums;
                  letter-spacing: .035em;
                  white-space: nowrap;
                }
                html[data-aldus-theme="premium-stable"] body #floatingTimer .timer-elapsed-time[hidden] {
                  display: none !important;
                }
                @media (max-width: 720px) {
                  html[data-aldus-theme="premium-stable"] body #floatingTimer .timer-elapsed-time {
                    padding: 7px 9px;
                  }
                }
              `;
              document.head.appendChild(style);
            }

            function ensureDisplay() {
              let row = document.getElementById("timerElapsedTime");
              if (row) return row;
              row = document.createElement("small");
              row.id = "timerElapsedTime";
              row.className = "timer-elapsed-time";
              row.dataset.timerElapsedVersion = PATCH_VERSION;
              const label = document.createElement("span");
              label.textContent = "Tempo estudado";
              const value = document.createElement("strong");
              value.textContent = "00:00:00";
              row.append(label, value);
              progressText.insertAdjacentElement("afterend", row);
              return row;
            }

            function safeElapsedSeconds() {
              try {
                return typeof currentTimerSeconds === "function"
                  ? Math.max(0, Number(currentTimerSeconds()) || 0)
                  : 0;
              } catch (error) {
                console.warn("[Cronômetro] Não foi possível atualizar o tempo crescente.", error);
                return 0;
              }
            }

            function safeFormat(seconds) {
              if (typeof formatTimerSeconds === "function") return formatTimerSeconds(seconds);
              const total = Math.max(0, Math.floor(Number(seconds) || 0));
              const hours = Math.floor(total / 3600);
              const minutes = Math.floor((total % 3600) / 60);
              const rest = total % 60;
              return [hours, minutes, rest].map((part) => String(part).padStart(2, "0")).join(":");
            }

            function updateElapsedDisplay() {
              const row = ensureDisplay();
              const visible = !timer.hidden && timerMode.value === "countdown";
              row.hidden = !visible;
              if (!visible) return;
              const formatted = safeFormat(safeElapsedSeconds());
              const value = row.querySelector("strong");
              if (value && value.textContent !== formatted) value.textContent = formatted;
              row.setAttribute("aria-label", `Tempo estudado: ${formatted}`);
            }

            ensureStyles();
            const observer = new MutationObserver(updateElapsedDisplay);
            observer.observe(timerTime, { childList: true, characterData: true, subtree: true });
            observer.observe(timer, { attributes: true, attributeFilter: ["hidden"] });
            timerMode.addEventListener("change", updateElapsedDisplay);
            document.addEventListener("visibilitychange", () => {
              if (!document.hidden) updateElapsedDisplay();
            });
            updateElapsedDisplay();
          })();
          '''

          for path in [Path(filename), Path("docs") / filename]:
              path.parent.mkdir(parents=True, exist_ok=True)
              if path.exists():
                  raise SystemExit(f"Arquivo já existe: {path}")
              path.write_text(js, encoding="utf-8")

          anchor = '  <script src="central-goals-real-time-v124.js?v=20260721-central-tempo-visibilidade-v125"></script>'
          for path in [Path("index.html"), Path("docs/index.html")]:
              text = path.read_text(encoding="utf-8")
              if text.count(anchor) != 1:
                  raise SystemExit(f"Âncora do cronômetro não encontrada uma vez em {path}")
              if script_tag in text:
                  raise SystemExit(f"Nova referência já existe em {path}")
              path.write_text(text.replace(anchor, anchor + "\n" + script_tag, 1), encoding="utf-8")

          cache_anchor = '  "central-goals-real-time-v124.js?v=20260721-central-tempo-visibilidade-v125",'
          cache_entry = f'  "{filename}?v={version}",'
          for path in [Path("service-worker.js"), Path("docs/service-worker.js")]:
              text = path.read_text(encoding="utf-8")
              if text.count(cache_anchor) != 1:
                  raise SystemExit(f"Âncora do cache não encontrada uma vez em {path}")
              if cache_entry in text:
                  raise SystemExit(f"Nova entrada de cache já existe em {path}")
              path.write_text(text.replace(cache_anchor, cache_anchor + "\n" + cache_entry, 1), encoding="utf-8")

          for root_file, docs_file in [
              (filename, f"docs/{filename}"),
              ("index.html", "docs/index.html"),
              ("service-worker.js", "docs/service-worker.js"),
          ]:
              if Path(root_file).read_bytes() != Path(docs_file).read_bytes():
                  raise SystemExit(f"Paridade quebrada entre {root_file} e {docs_file}")
          PY

      - name: Validar sintaxe e comportamento isolado
        shell: bash
        run: |
          node --check timer-elapsed-v127.js
          node <<'NODE'
          const assert = require("node:assert/strict");
          const fs = require("node:fs");
          const vm = require("node:vm");

          class ElementMock {
            constructor(id = "", tag = "div") {
              this.id = id;
              this.tagName = tag.toUpperCase();
              this.hidden = false;
              this.value = "";
              this.textContent = "";
              this.dataset = {};
              this.children = [];
              this.listeners = {};
              this.attributes = {};
            }
            append(...nodes) { this.children.push(...nodes); }
            appendChild(node) { this.children.push(node); return node; }
            insertAdjacentElement(_position, node) { elements.set(node.id, node); this.inserted = node; return node; }
            querySelector(selector) { return selector === "strong" ? this.children.find((child) => child.tagName === "STRONG") || null : null; }
            addEventListener(type, callback) { this.listeners[type] = callback; }
            setAttribute(name, value) { this.attributes[name] = value; }
          }

          const elements = new Map();
          const timer = new ElementMock("floatingTimer");
          const progress = new ElementMock("timerProgressText", "small");
          const timerTime = new ElementMock("timerTime", "strong");
          const timerMode = new ElementMock("timerMode", "select");
          timerMode.value = "countdown";
          elements.set(timer.id, timer);
          elements.set(progress.id, progress);
          elements.set(timerTime.id, timerTime);
          elements.set(timerMode.id, timerMode);
          const head = new ElementMock("head", "head");

          let elapsed = 452;
          class MutationObserverMock { constructor(callback) { this.callback = callback; } observe() {} }
          const documentMock = {
            hidden: false,
            head,
            getElementById(id) { return elements.get(id) || null; },
            createElement(tag) { return new ElementMock("", tag); },
            addEventListener() {}
          };

          const context = {
            console,
            document: documentMock,
            MutationObserver: MutationObserverMock,
            currentTimerSeconds() { return elapsed; },
            formatTimerSeconds(seconds) {
              const total = Math.max(0, Number(seconds) || 0);
              const h = Math.floor(total / 3600);
              const m = Math.floor((total % 3600) / 60);
              const s = total % 60;
              return [h, m, s].map((part) => String(part).padStart(2, "0")).join(":");
            }
          };
          context.globalThis = context;
          vm.createContext(context);
          vm.runInContext(fs.readFileSync("timer-elapsed-v127.js", "utf8"), context);

          const row = elements.get("timerElapsedTime");
          assert.ok(row, "O contador crescente deve ser inserido");
          assert.equal(row.hidden, false);
          assert.equal(row.querySelector("strong").textContent, "00:07:32");
          assert.equal(row.attributes["aria-label"], "Tempo estudado: 00:07:32");

          timerMode.value = "free";
          timerMode.listeners.change();
          assert.equal(row.hidden, true, "No modo livre o contador secundário deve ser ocultado");

          timerMode.value = "countdown";
          elapsed = 0;
          timerMode.listeners.change();
          assert.equal(row.hidden, false);
          assert.equal(row.querySelector("strong").textContent, "00:00:00");
          console.log("Contador crescente validado sem alterar o motor do cronômetro.");
          NODE

      - name: Confirmar alteração mínima
        shell: bash
        run: |
          git diff --check
          test "$(grep -c 'timer-elapsed-v127.js?v=20260721-cronometro-crescente-v127' index.html)" -eq 1
          test "$(grep -c 'timer-elapsed-v127.js?v=20260721-cronometro-crescente-v127' docs/index.html)" -eq 1
          test "$(grep -c 'timer-elapsed-v127.js?v=20260721-cronometro-crescente-v127' service-worker.js)" -eq 1
          test "$(grep -c 'timer-elapsed-v127.js?v=20260721-cronometro-crescente-v127' docs/service-worker.js)" -eq 1
          cmp timer-elapsed-v127.js docs/timer-elapsed-v127.js
          cmp index.html docs/index.html
          cmp service-worker.js docs/service-worker.js
          python3 - <<'PY'
          import subprocess
          allowed = {
              ".github/workflows/apply-timer-elapsed-v127.yml",
              "timer-elapsed-v127.js",
              "docs/timer-elapsed-v127.js",
              "index.html",
              "docs/index.html",
              "service-worker.js",
              "docs/service-worker.js",
          }
          changed = set(subprocess.check_output(["git", "diff", "--name-only"], text=True).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f"Arquivos inesperados alterados: {sorted(unexpected)}")
          required = allowed - {".github/workflows/apply-timer-elapsed-v127.yml"}
          missing = required - changed
          if missing:
              raise SystemExit(f"Arquivos esperados não alterados: {sorted(missing)}")
          PY

      - name: Publicar e remover rotina temporária
        shell: bash
        run: |
          git rm .github/workflows/apply-timer-elapsed-v127.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Adiciona cronômetro crescente ao modo regressivo"
          git push
