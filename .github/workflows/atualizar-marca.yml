name: Atualizar marca do site

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/atualizar-marca.yml"

permissions:
  contents: write

jobs:
  atualizar-marca:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Alterar nome exibido no cabeçalho
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = "<strong>Metas Concurso</strong>"
          new = "<strong>Aldus Metas Concurso</strong>"

          if old not in text:
              if new in text:
                  print("A marca já está atualizada.")
                  raise SystemExit(0)
              raise SystemExit("Texto original não encontrado em index.html")

          path.write_text(text.replace(old, new, 1), encoding="utf-8")

      - name: Salvar alteração
        run: |
          if git diff --quiet; then
            echo "Nenhuma alteração necessária."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Atualiza marca para Aldus Metas Concurso"
          git push
