name: Aumentar volume motivacional v126

on:
  push:
    paths:
      - ".github/workflows/apply-motivational-volume-v126.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Aplicar ajuste isolado
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          old_call = 'scheduleChimeTone(context, tone.frequency, startAt + tone.delay, index === tones.length - 1 ? .22 : .17, .055);'
          new_call = 'scheduleChimeTone(context, tone.frequency, startAt + tone.delay, index === tones.length - 1 ? .22 : .17, .08);'
          runtime_files = [
              Path('question-accuracy-spectrum.js'),
              Path('docs/question-accuracy-spectrum.js'),
              Path('app-v118.js'),
              Path('docs/app-v118.js'),
          ]
          for path in runtime_files:
              text = path.read_text(encoding='utf-8')
              if text.count(old_call) != 1:
                  raise SystemExit(f'Quantidade inesperada do ganho antigo em {path}: {text.count(old_call)}')
              if new_call in text:
                  raise SystemExit(f'O ganho novo já existia em {path}')
              path.write_text(text.replace(old_call, new_call, 1), encoding='utf-8')

          test_replacements = {
              Path('tests/motivational-sound.test.js'): [
                  ('assert.match(source, /\\.055/);', 'assert.match(source, /\\.08/);'),
              ],
              Path('tests/v97-timer-scroll-motivation.test.js'): [
                  ('assert.match(spectrum, /scheduleChimeTone\\([^\\n]+, \\.055\\);/);', 'assert.match(spectrum, /scheduleChimeTone\\([^\\n]+, \\.08\\);/);'),
              ],
          }
          for path, replacements in test_replacements.items():
              text = path.read_text(encoding='utf-8')
              for old, new in replacements:
                  if text.count(old) != 1:
                      raise SystemExit(f'Âncora de teste não encontrada uma vez em {path}: {old}')
                  text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')

          old_asset = 'app-v118.js?v=20260721-prompt-lei-fonte-preta-v123'
          new_asset = 'app-v118.js?v=20260721-motivacional-volume-v126'
          for path in [Path('index.html'), Path('docs/index.html')]:
              text = path.read_text(encoding='utf-8')
              if text.count(old_asset) != 2:
                  raise SystemExit(f'Esperadas duas referências antigas em {path}, encontradas {text.count(old_asset)}')
              if new_asset in text:
                  raise SystemExit(f'Referência nova já existente em {path}')
              path.write_text(text.replace(old_asset, new_asset), encoding='utf-8')

          old_cache = '  `app-v118.js?v=${CURRENT_VERSION}`,'
          new_cache = '  "app-v118.js?v=20260721-motivacional-volume-v126",'
          for path in [Path('service-worker.js'), Path('docs/service-worker.js')]:
              text = path.read_text(encoding='utf-8')
              if text.count(old_cache) != 1:
                  raise SystemExit(f'Entrada antiga do cache não encontrada uma vez em {path}')
              if new_cache in text:
                  raise SystemExit(f'Entrada nova do cache já existente em {path}')
              path.write_text(text.replace(old_cache, new_cache, 1), encoding='utf-8')

          for root_file, docs_file in [
              ('question-accuracy-spectrum.js', 'docs/question-accuracy-spectrum.js'),
              ('app-v118.js', 'docs/app-v118.js'),
              ('index.html', 'docs/index.html'),
              ('service-worker.js', 'docs/service-worker.js'),
          ]:
              if Path(root_file).read_bytes() != Path(docs_file).read_bytes():
                  raise SystemExit(f'Paridade quebrada entre {root_file} e {docs_file}')

          peak = 0.08
          if not (0.055 < peak <= 0.10):
              raise SystemExit('O novo ganho saiu da faixa moderada de segurança')
          PY

      - name: Validar sintaxe e teste focado
        shell: bash
        run: |
          node --check question-accuracy-spectrum.js
          node --check app-v118.js
          node --test tests/motivational-sound.test.js
          grep -Fq '.17, .08);' question-accuracy-spectrum.js
          grep -Fq '.17, .08);' app-v118.js
          ! grep -Fq '.17, .055);' question-accuracy-spectrum.js
          ! grep -Fq '.17, .055);' app-v118.js
          git diff --check

      - name: Confirmar alteração mínima
        shell: bash
        run: |
          python3 - <<'PY'
          import subprocess
          allowed = {
              '.github/workflows/apply-motivational-volume-v126.yml',
              'question-accuracy-spectrum.js',
              'docs/question-accuracy-spectrum.js',
              'app-v118.js',
              'docs/app-v118.js',
              'tests/motivational-sound.test.js',
              'tests/v97-timer-scroll-motivation.test.js',
              'index.html',
              'docs/index.html',
              'service-worker.js',
              'docs/service-worker.js',
          }
          changed = set(subprocess.check_output(['git', 'diff', '--name-only'], text=True).splitlines())
          unexpected = changed - allowed
          if unexpected:
              raise SystemExit(f'Arquivos inesperados alterados: {sorted(unexpected)}')
          required = allowed - {'.github/workflows/apply-motivational-volume-v126.yml'}
          missing = required - changed
          if missing:
              raise SystemExit(f'Arquivos esperados não alterados: {sorted(missing)}')
          PY

      - name: Publicar e remover rotina temporária
        shell: bash
        run: |
          git rm .github/workflows/apply-motivational-volume-v126.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Aumenta volume do toque motivacional com segurança"
          git push
